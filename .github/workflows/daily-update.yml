name: Daily Update by 23f3003316@ds.study.iitm.ac.in
on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Create daily log by 23f3003316@ds.study.iitm.ac.in
      run: echo "$(date)" >> daily-log.txt
    - run: |
        git config user.name "DevSync Bot"
        git config user.email "23f3003316@ds.study.iitm.ac.in"
        git add daily-log.txt
        git commit -m "Daily update $(date)"
        git push
